<!-- ===== CONTACT MODAL ===== -->
<div class="contact-modal" id="contact-modal" onclick="if(event.target===this)closeContactModal()">

    <button class="contact-modal-close" onclick="closeContactModal()">✕</button>
    <div class="contact-modal-title" id="contact-modal-title">Contact</div>
    <div class="contact-modal-sub" id="contact-modal-sub">Envoyez un message direct</div>

      <input  class="contact-field" name="name"    id="cf-name"    required autocomplete="name"/>
      <input  class="contact-field" name="email"   id="cf-email"   required autocomplete="email" type="email"/>
      <textarea class="contact-field" name="message" id="cf-msg"   required rows="4"></textarea>

      </div>

      <div class="progress-bar-container">
        <div class="progress-label" id="progress-label"></div>
        <div class="progress-track">

<script>
  // Service Worker desactive (evite les problemes de cache)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
  }

  // PWA install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('install-btn');
    if (btn) btn.style.display = 'block';
  });
  document.getElementById('install-btn').addEventListener('click', () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-btn').style.display = 'none';
    });
  });
</script>
